<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UBrush Drawing Engine Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #171717;
      color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #242424;
      border-right: 1px solid #383838;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      font-size: 12px;
    }
    #sidebar h1 {
      font-size: 14px;
      color: #62a7e8;
      padding-bottom: 8px;
      border-bottom: 1px solid #3a3a3a;
      margin-bottom: 3px;
    }
    #sidebar label {
      display: block;
      margin-bottom: 4px;
      color: #a2a2a2;
      font-size: 11px;
      font-weight: 650;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    #sidebar select,
    #sidebar input {
      width: 100%;
      height: 30px;
      background: #333;
      color: #e5e5e5;
      border: 1px solid #4a4a4a;
      border-radius: 4px;
      padding: 5px 7px;
      font-size: 12px;
      outline: none;
    }
    #sidebar button {
      height: 32px;
      background: #2d65a4;
      color: #f2f2f2;
      border: 1px solid #3978bd;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    #sidebar button.secondary {
      background: #404040;
      border-color: #555;
    }
    #sidebar button:disabled {
      opacity: .45;
      cursor: not-allowed;
    }
    .note {
      color: #858585;
      line-height: 1.45;
      font-size: 11px;
      padding-top: 2px;
    }
    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #canvas-wrap {
      flex: 1;
      min-height: 0;
      background: #f0f0f0;
      position: relative;
    }
    #gl {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status {
      min-height: 24px;
      padding: 5px 10px;
      color: #f0b050;
      font-size: 12px;
      background: #202020;
      border-top: 1px solid #333;
    }
    #diagnostics {
      max-height: 96px;
      overflow: auto;
      padding: 8px 10px;
      color: #8fa8bd;
      background: #1b1b1b;
      border-top: 1px solid #303030;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 10px;
      line-height: 1.35;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #results {
      height: 300px;
      overflow: auto;
      padding: 8px 10px;
      background: #151515;
      border-top: 1px solid #303030;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
    }
    #results table {
      width: 100%;
      border-collapse: collapse;
    }
    #results th,
    #results td {
      padding: 5px 7px;
      border-bottom: 1px solid #292929;
      text-align: right;
      white-space: nowrap;
    }
    #results th {
      position: sticky;
      top: 0;
      background: #151515;
      color: #62a7e8;
      font-weight: 650;
      z-index: 1;
    }
    #results th:first-child,
    #results td:first-child,
    #results th:nth-child(2),
    #results td:nth-child(2) {
      text-align: left;
    }
    #results td:first-child {
      color: #bdbdbd;
    }
    .empty {
      color: #777;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="main">
      <div id="canvas-wrap"><canvas id="gl"></canvas></div>
      <div id="status"></div>
      <div id="diagnostics"></div>
      <div id="results"></div>
    </main>
  </div>
</body>
</html>
