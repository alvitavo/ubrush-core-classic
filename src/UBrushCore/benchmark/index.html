<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UBrush Benchmark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1a1a1a; color: #e0e0e0;
                 font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
    #app { display: flex; width: 100vw; height: 100vh; }
    #sidebar { width: 280px; min-width: 280px; background: #222; padding: 14px 12px;
               display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
               border-right: 1px solid #333; font-size: 12px; }
    #sidebar h1 { font-size: 14px; color: #4a90d9; padding-bottom: 8px;
                  border-bottom: 1px solid #333; margin-bottom: 4px; }
    #sidebar label { color: #9a9a9a; font-size: 11px; font-weight: 600;
                     text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 3px; }
    #sidebar select, #sidebar input { width: 100%; background: #333; color: #e0e0e0;
                                       border: 1px solid #444; border-radius: 4px;
                                       padding: 5px 7px; font-size: 12px; outline: none; }
    #sidebar button { padding: 8px; background: #2a5aa0; color: #e0e0e0;
                      border: 1px solid #2a5aa0; border-radius: 4px;
                      font-size: 12px; cursor: pointer; }
    #sidebar button.secondary { background: #444; border-color: #555; }
    #sidebar button:disabled { opacity: .4; cursor: not-allowed; }
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #canvas-wrap { flex: 1; position: relative; background: #f0f0f0; min-height: 0; }
    #gl { display: block; width: 100%; height: 100%; }
    #results { height: 240px; background: #181818; border-top: 1px solid #333;
               overflow: auto; padding: 8px 12px; font-family: ui-monospace, Menlo, monospace; font-size: 11px; }
    #results table { width: 100%; border-collapse: collapse; }
    #results th, #results td { padding: 4px 8px; text-align: right; border-bottom: 1px solid #2a2a2a; white-space: nowrap; }
    #results th:first-child, #results td:first-child { text-align: left; color: #9a9a9a; }
    #results thead { color: #4a90d9; }
    #status { padding: 4px 8px; color: #f0a030; font-size: 11px; }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar"></aside>
    <main id="main">
      <div id="canvas-wrap"><canvas id="gl"></canvas></div>
      <div id="status"></div>
      <div id="results"></div>
    </main>
  </div>
</body>
</html>
